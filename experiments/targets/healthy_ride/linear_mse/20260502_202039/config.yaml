#Meta data 
experiment_name: "linear_dfl"

paths:
  raw_trips: "data/raw/healthy_ride_trips.parquet"
  stations: "data/raw/healthy_ride_stations.parquet"
  station_dist_miles: "data/raw/healthy_ride_station_dist_miles.parquet"
  station_dist_min: "data/raw/healthy_ride_station_dist_min.parquet"
  input: "data/processed/healthy_ride_input.parquet"

data:
  train_start_date: '2019-01-01' #Start and End dates are inclusive
  train_end_date: '2020-12-31'
  test_start_date: '2021-01-01'
  test_end_date: '2021-12-31'

training:
  batch_size: 32
  warmup_epochs: 0
  epochs: 25
  learning_rate: 1.0e-3
  decision_loss: False
  weight_decay : 1.0e-3

model:
  hidden_layers: []
  loss_demand_cost: 1   
  over_capacity_cost: 1      

sim:
  start_inv_pct: 0.5
  cutoff_hour: 24
  reset_inv: True